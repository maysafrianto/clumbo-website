name: Deploy to VPS

on:
  push:
    branches:
      - main # Jalankan otomatisasi hanya jika ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH to Herza VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }} # <-- SUDAH DIGANTI JADI password
          port: 22
          script: |
            # Membuat folder project di VPS jika belum ada
            mkdir -p ~/clumbo-website
            cd ~/clumbo-website
            
            # Jika folder baru/kosong, inisialisasi git bawaan repositori kamu
            if [ ! -d ".git" ]; then
              git clone https://github.com/maysafrianto/clumbo-website.git .
            fi
            
            # Ambil kodingan HTML dan Docker terbaru dari GitHub ke VPS
            git reset --hard origin/main
            git pull origin main
            
            # Jalankan docker website kamu di VPS
            docker compose up -d --build
